name: Test

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:  # Allows manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  regular_test:
    name: "${{ format('Test ({0}{1}, C++{2}, {3})', matrix.info, matrix.compiler, matrix.standard, matrix.mode) }}"
    uses: ./.github/workflows/test.yaml
    strategy:
      fail-fast: false
      matrix:
        # This include block is AUTOGENERATED, do not edit by hand
        # instead edit + re-run .github/workflows/gen-matrix.py
        include:
          - {compiler: clang++, standard: 20, mode: dev}
          - {compiler: clang++, standard: 20, mode: debug}
          - {compiler: clang++, standard: 20, mode: release}
          - {compiler: clang++, standard: 23, mode: dev}
          - {compiler: clang++, standard: 23, mode: debug}
          - {compiler: clang++, standard: 23, mode: release}
          - {compiler: g++, standard: 20, mode: dev}
          - {compiler: g++, standard: 20, mode: debug}
          - {compiler: g++, standard: 20, mode: release}
          - {compiler: g++, standard: 23, mode: dev}
          - {compiler: g++, standard: 23, mode: debug}
          - {compiler: g++, standard: 23, mode: release}
          - {compiler: clang++, standard: 23, mode: release, enables: --enable-dpdk, options: "--cook dpdk --dpdk-machine corei7-avx", info: "dpdk, "}
          - {compiler: clang++, standard: 23, mode: debug, enables: --enable-cxx-modules, enable-ccache: false, info: "modules, "}
          - {compiler: clang++, standard: 23, mode: fuzz, test-args: "-- -R 'Seastar.fuzz.'"}
        # end of AUTOGENERATED part
    with:
      compiler: ${{ matrix.compiler }}
      standard: ${{ matrix.standard }}
      mode: ${{ matrix.mode }}
      enables: ${{ matrix.enables }}
      options: ${{ matrix.options }}
      enable-ccache: ${{ !contains(matrix['enable-ccache'], 'false') }}
      test-args: ${{ matrix['test-args'] }}
