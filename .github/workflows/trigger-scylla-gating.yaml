# Place this file in the scylladb/seastar repo at:
#   .github/workflows/trigger-scylla-gating.yaml
#
# Triggers the scylla next-gating pipeline (RELENG-31) on every seastar PR so we
# learn about scylla/seastar integration breakage before the seastar change merges.
# The Jenkins job (scylla-master/job/seastar-ci) checks out scylla master, swaps in
# this PR's merge ref for the seastar submodule, runs full next-gating, and reports
# a commit status back onto this PR.
#
# Can also be run manually via workflow_dispatch, passing a PR number, for testing.
#
# Requires repo secrets: JENKINS_USERNAME, JENKINS_TOKEN, SLACK_BOT_TOKEN.
name: Trigger scylla next-gating

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'seastar PR number to test against scylla master'
        required: true
        type: string

permissions: {}

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins Job
        env:
          JENKINS_USER: ${{ secrets.JENKINS_USERNAME }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          JENKINS_URL: "https://jenkins.scylladb.com"
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          JOB_NAME: "scylla-master/job/seastar-ci"
          PR_NUMBER: ${{ github.event.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "Triggering Jenkins job $JOB_NAME for seastar PR #$PR_NUMBER"
          if ! curl -X POST "$JENKINS_URL/job/$JOB_NAME/buildWithParameters" \
                --fail --user "$JENKINS_USER:$JENKINS_API_TOKEN" \
                --data-urlencode "SEASTAR_PR_NUMBER=$PR_NUMBER" -i -v; then
            echo "Error: Jenkins job trigger failed"

            # Notify releng so a dropped trigger doesn't go unnoticed
            curl -X POST -H 'Content-type: application/json' \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              --data "$(jq -n \
                --arg channel '#releng-team' \
                --arg text "🚨 @here '${JOB_NAME}' failed to be triggered for seastar PR #${PR_NUMBER}, please check https://github.com/${REPO}/actions/runs/${RUN_ID} for more details" \
                --arg icon ':warning:' \
                '{channel: $channel, text: $text, icon_emoji: $icon}')" \
              https://slack.com/api/chat.postMessage

            exit 1
          fi